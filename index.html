<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NPTEL EIA Study Tool - Night Edition</title>
    <style>
        :root { 
            --primary: #e0e0e0; 
            --accent: #bb86fc;
            --success: #03dac6; 
            --danger: #cf6679; 
            --bg: #121212; 
            --surface: #1e1e1e;
            --card-border: #333;
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            line-height: 1.6; 
            max-width: 600px; 
            margin: 0 auto; 
            padding: 15px; 
            background: var(--bg); 
            color: var(--primary); 
        }
        
        .header { 
            position: sticky; 
            top: 0; 
            background: rgba(18, 18, 18, 0.9); 
            backdrop-filter: blur(10px);
            padding: 15px 0; 
            z-index: 100; 
            border-bottom: 1px solid var(--card-border); 
        }
        
        .stats-bar { 
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            font-weight: 600; 
            font-size: 12px; 
            margin-top: 10px;
            color: var(--accent);
            text-transform: uppercase;
        }

        .persistent-stats {
            grid-column: span 2;
            text-align: center;
            border-top: 1px solid #333;
            padding-top: 5px;
            margin-top: 5px;
            color: var(--success);
            font-size: 11px;
        }
        
        select { 
            width: 100%; 
            padding: 15px; 
            font-size: 16px; 
            border-radius: 12px; 
            border: 2px solid var(--accent); 
            background: var(--surface); 
            color: white;
            appearance: none;
        }
        
        .progress-container { 
            width: 100%; 
            background: #333; 
            height: 10px; 
            border-radius: 5px; 
            margin: 15px 0 5px 0; 
            overflow: hidden; 
        }
        
        #progress-bar { 
            width: 0%; 
            height: 100%; 
            background: linear-gradient(90deg, var(--accent), var(--success)); 
            transition: width 0.5s ease; 
        }

        .card { 
            background: var(--surface); 
            padding: 20px; 
            border-radius: 20px; 
            box-shadow: 0 8px 32px rgba(0,0,0,0.4); 
            margin-bottom: 20px; 
            border: 1px solid var(--card-border);
        }
        
        h4 { margin-top: 0; font-size: 18px; color: var(--accent); }

        .option { 
            display: block; 
            width: 100%; 
            padding: 16px; 
            margin: 12px 0; 
            border: 1px solid var(--card-border); 
            border-radius: 12px; 
            cursor: pointer; 
            text-align: left; 
            background: #252525; 
            color: #ccc;
            font-size: 15px; 
            transition: 0.2s;
        }
        
        .correct { background-color: rgba(3, 218, 198, 0.15) !important; border-color: var(--success) !important; color: var(--success) !important; font-weight: bold; }
        .wrong { background-color: rgba(207, 102, 121, 0.15) !important; border-color: var(--danger) !important; color: var(--danger) !important; font-weight: bold; }

        #review-panel { 
            margin-top: 30px; 
            border-radius: 20px; 
            overflow: hidden; 
            border: 1px solid var(--danger);
            background: var(--surface);
            display: none;
        }
        
        .review-header { 
            background: var(--danger); 
            color: white; 
            padding: 12px; 
            font-weight: bold; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
        }
        
        .wrong-entry { border-bottom: 1px solid #333; padding: 15px; font-size: 14px; }
        .clear-btn { background: rgba(255,255,255,0.2); color: white; border: 1px solid white; padding: 5px 10px; border-radius: 8px; font-size: 10px; cursor: pointer; }
    </style>
</head>

let sessionScore = 0;
let sessionAnswered = 0;

window.onload = () => {
    const savedWeek = localStorage.getItem('lastWeek') || "1";
    document.getElementById('week-selector').value = savedWeek;
    loadQuiz(savedWeek);
    renderSavedWrongs();
    updateLifeStats();
};

function changeWeek() {
    const val = document.getElementById('week-selector').value;
    localStorage.setItem('lastWeek', val);
    loadQuiz(val);
}

function loadQuiz(week) {
    const questions = quizData[week] || [];
    const container = document.getElementById('quiz-container');
    container.innerHTML = '';
    sessionScore = 0; 
    sessionAnswered = 0;
    updateStats(questions.length);

    if (questions.length === 0) {
        container.innerHTML = '<p style="text-align:center; padding:20px;">No questions found for this week.</p>';
        return;
    }

    questions.forEach((item, idx) => {
        const card = document.createElement('div');
        card.className = 'card';
        
        let contentHtml = `<h4>Q${idx + 1}: ${item.q}</h4>`;
        
        // --- ADD IMAGE SUPPORT HERE ---
        if (item.image) {
            contentHtml += `<img src="${item.image}" alt="Question Image" style="max-width:100%; height:auto; border-radius:10px; margin:10px 0; border: 1px solid #444;">`;
        }
        
        if (item.table) {
            let tableHtml = '<table style="width:100%; border-collapse:collapse; margin:15px 0; font-size:13px; border:1px solid #444;">';
            item.table.forEach(row => {
                tableHtml += `<tr style="border-bottom:1px solid #333;">
                    <td style="padding:8px; border-right:1px solid #333; color:#bb86fc; font-weight:bold;">${row[0]}</td>
                    <td style="padding:8px; color:#e0e0e0;">${row[1]}</td>
                </tr>`;
            });
            tableHtml += '</table>';
            contentHtml += tableHtml;
        }

        card.innerHTML = contentHtml;

        item.options.forEach((opt, oIdx) => {
            const btn = document.createElement('button');
            btn.className = 'option';
            btn.innerText = opt;
            btn.onclick = () => {
                if(card.classList.contains('done')) return;
                card.classList.add('done');
                sessionAnswered++;
                
                let isCorrect = (oIdx === item.a);
                if(isCorrect) {
                    btn.classList.add('correct'); 
                    sessionScore++;
                } else {
                    btn.classList.add('wrong');
                    const options = card.querySelectorAll('.option');
                    options[item.a].classList.add('correct');
                    saveWrong(item.q, item.options[item.a]);
                }
                saveToLifeStats(isCorrect);
                updateStats(questions.length);
            };
            card.appendChild(btn);
        });
        container.appendChild(card);
    });
}
function saveToLifeStats(isCorrect) {
    let lifeScore = parseInt(localStorage.getItem('lifeScore') || '0');
    let lifeTotal = parseInt(localStorage.getItem('lifeTotal') || '0');
    
    if(isCorrect) lifeScore++;
    lifeTotal++;
    
    localStorage.setItem('lifeScore', lifeScore);
    localStorage.setItem('lifeTotal', lifeTotal);
    updateLifeStats();
}

function updateLifeStats() {
    const s = localStorage.getItem('lifeScore') || '0';
    const t = localStorage.getItem('lifeTotal') || '0';
    const acc = t > 0 ? Math.round((s / t) * 100) : 0;
    
    document.getElementById('life-score').innerText = s;
    document.getElementById('life-total').innerText = t;
    document.getElementById('life-acc').innerText = acc;
}

function saveWrong(q, a) {
    let wrongs = JSON.parse(localStorage.getItem('wrongQuestions') || '[]');
    wrongs.push({q, a});
    localStorage.setItem('wrongQuestions', JSON.stringify(wrongs));
    renderSavedWrongs();
}

function renderSavedWrongs() {
    const wrongs = JSON.parse(localStorage.getItem('wrongQuestions') || '[]');
    const log = document.getElementById('wrong-log');
    const panel = document.getElementById('review-panel');
    if(wrongs.length === 0) { panel.style.display = 'none'; return; }
    panel.style.display = 'block';
    log.innerHTML = wrongs.map(w => `<div class="wrong-entry"><strong>Q:</strong> ${w.q}<br><span style="color:var(--success)"><strong>A:</strong> ${w.a}</span></div>`).join('');
}

function clearReview() {
    localStorage.clear();
    location.reload();
}

function updateStats(total) {
    document.getElementById('score').innerText = sessionScore;
    document.getElementById('total-qs').innerText = total;
    document.getElementById('progress-bar').style.width = total > 0 ? (sessionAnswered / total) * 100 + '%' : '0%';
    const acc = sessionAnswered > 0 ? Math.round((sessionScore / sessionAnswered) * 100) : 0;
    document.getElementById('accuracy').innerText = `ACCURACY: ${acc}%`;
}
</script>
